<style>
.grid-comic {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 20px;
}

.grid-comic img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    cursor: zoom-in;
    display: block;
}

/* ZOOM (LIGHTBOX) */
.zoom {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.zoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* UPLOAD BOX */
.upload-box {
    max-width: 400px;
    margin: 20px auto;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    text-align: center;
    color: white;
}

.upload-box input,
.upload-box button {
    width: 100%;
    margin-top: 10px;
}

.upload-box button {
    padding: 10px;
    background: #6c5ce7;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.upload-box button:hover {
    background: #5a4bd6;
}

.upload-box img {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 8px;
}
</style>

</head>

<!-- JS ZOOM + SUPABASE -->
<script>
let zoomLevel = 2.5;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

window.abrirZoom = function(img) {
    const zoom = document.getElementById("zoom");
    const zoomImg = document.getElementById("zoomImg");

    zoomImg.src = img.src;

    zoom.style.display = "flex";

    zoomLevel = 2.5;
    posX = 0;
    posY = 0;

    updateTransform();
}

/* fechar */
window.fecharZoom = function() {
    document.getElementById("zoom").style.display = "none";
}

/* aplicar transformação */
function updateTransform() {
    const img = document.getElementById("zoomImg");
    img.style.transform = `translate(${posX}px, ${posY}px) scale(${zoomLevel})`;
}

/* 🔥 ZOOM COM SCROLL */
document.addEventListener("wheel", function(e) {
    const zoom = document.getElementById("zoom");

    if (zoom.style.display === "flex") {

        e.preventDefault();

        if (e.deltaY < 0) zoomLevel += 0.2;
        else zoomLevel -= 0.2;

        if (zoomLevel < 1) zoomLevel = 1;
        if (zoomLevel > 6) zoomLevel = 6;

        updateTransform();
    }
}, { passive: false });

/* 🖐️ ARRASTAR (MÃOZINHA) */
document.addEventListener("mousedown", function(e) {
    const zoom = document.getElementById("zoom");

    if (zoom.style.display !== "flex") return;

    isDragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;

    document.body.style.cursor = "grabbing";
});

document.addEventListener("mouseup", function() {
    isDragging = false;
    document.body.style.cursor = "default";
});

document.addEventListener("mousemove", function(e) {
    if (!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateTransform();
});
</script>
