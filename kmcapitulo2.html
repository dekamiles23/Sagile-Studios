<style>
.grid-comic {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 20px;
}

.grid-comic img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    cursor: zoom-in;
    display: block;
}

/* ZOOM */
.zoom {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    overflow: hidden;
}

.zoom img {
    max-width: none;
    max-height: none;
    border-radius: 10px;
    cursor: grab;
    user-select: none;
}

/* UPLOAD BOX */
.upload-box {
    max-width: 400px;
    margin: 20px auto;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    text-align: center;
    color: white;
}

.upload-box input,
.upload-box button {
    width: 100%;
    margin-top: 10px;
}

.upload-box button {
    padding: 10px;
    background: #6c5ce7;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.upload-box button:hover {
    background: #5a4bd6;
}

.upload-box img {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 8px;
}
</style>

</head>

<script>

/// 🔍 ZOOM + ARRASTAR

const zoom = document.getElementById("zoom");
const zoomImg = document.getElementById("zoomImg");

let scale = 2;
let isDragging = false;
let startX, startY;
let translateX = 0;
let translateY = 0;

function abrirZoom(img) {
    zoom.style.display = "flex";
    zoomImg.src = img.src;

    scale = 2;
    translateX = 0;
    translateY = 0;

    updateTransform();
}

function fecharZoom() {
    zoom.style.display = "none";
}

zoom.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.deltaY < 0) scale += 0.2;
    else {
        scale -= 0.2;
        if (scale < 1) scale = 1;
    }

    updateTransform();
});

zoomImg.addEventListener("mousedown", (e) => {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
    zoomImg.style.cursor = "grabbing";
});

window.addEventListener("mouseup", () => {
    isDragging = false;
    zoomImg.style.cursor = "grab";
});

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    translateX = e.clientX - startX;
    translateY = e.clientY - startY;

    updateTransform();
});

function updateTransform() {
    zoomImg.style.transform =
        `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

</script>
