<style>
.grid-comic {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 20px;
}

.grid-comic img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    cursor: zoom-in;
    display: block;
}

/* ZOOM (LIGHTBOX) */
.zoom {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.zoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* UPLOAD BOX */
.upload-box {
    max-width: 400px;
    margin: 20px auto;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    text-align: center;
    color: white;
}

.upload-box input,
.upload-box button {
    width: 100%;
    margin-top: 10px;
}

.upload-box button {
    padding: 10px;
    background: #6c5ce7;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.upload-box button:hover {
    background: #5a4bd6;
}

.upload-box img {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 8px;
}
</style>

</head>

<!-- JS ZOOM + SUPABASE -->
<script>

/// ❄️ NEVE
const container = document.querySelector(".snow-container");

for (let i = 0; i < 50; i++) {
    const flake = document.createElement("div");
    flake.classList.add("snowflake");
    flake.innerHTML = "•";

    flake.style.left = Math.random() * 100 + "vw";
    flake.style.animationDuration = (5 + Math.random() * 5) + "s";
    flake.style.fontSize = (5 + Math.random() * 10) + "px";

    container.appendChild(flake);
}

/// 🎬 TRANSIÇÃO (corrigida)
const transition = document.querySelector(".transition");

window.addEventListener("load", () => {
    setTimeout(() => {
        transition.classList.remove("active");
    }, 100);
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {

        const href = this.getAttribute("href");

        if (!href || href.startsWith("http")) return;

        e.preventDefault();

        transition.classList.add("active");

        setTimeout(() => {
            window.location.href = href;
        }, 500);
    });
});

/// 🔥 SCROLL
function revealOnScroll() {
    document.querySelectorAll(".reveal").forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);

/// 📱 MENU
document.querySelector(".menu-toggle").onclick = () => {
    document.getElementById("menu").classList.toggle("active");
};

/// 🔵 HIGHLIGHT AZUL (menu)
const menu = document.querySelector("#menu");
const highlight = menu.querySelector(".highlight");
const links = menu.querySelectorAll("a");

function moveHighlight(el) {
    const rect = el.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();

    highlight.style.width = rect.width + "px";
    highlight.style.left = (rect.left - menuRect.left) + "px";
}

// quando passa o mouse
links.forEach(link => {
    link.addEventListener("mouseenter", () => {
        moveHighlight(link);
    });
});

// quando carrega a página (fica no botão atual)
window.addEventListener("load", () => {
    links.forEach(link => {
        if (link.href.includes("livro.html")) {
            moveHighlight(link);
        }
    });
});
</script>
