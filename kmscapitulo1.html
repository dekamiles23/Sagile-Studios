<!-- ZOOM -->
<div id="zoom" class="zoom" onclick="fecharZoom()">

<button class="nav prev" onclick="event.stopPropagation(); anterior()">❮</button>

<img id="zoomImg" onclick="event.stopPropagation()">

<button class="nav next" onclick="event.stopPropagation(); proxima()">❯</button>

</div>

<script>

const zoom = document.getElementById("zoom");
const zoomImg = document.getElementById("zoomImg");

let imagens = document.querySelectorAll(".grid-comic img");
let indexAtual = 0;

let scale = 2;
let isDragging = false;
let startX, startY;
let translateX = 0;
let translateY = 0;

function abrirZoom(img) {
    zoom.style.display = "flex";

    imagens = document.querySelectorAll(".grid-comic img");
    indexAtual = Array.from(imagens).indexOf(img);

    zoomImg.src = imagens[indexAtual].src;

    translateX = 0;
    translateY = 0;

    // 🔥 FIT NA TELA (sem zoom inicial)
    scale = Math.min(
        window.innerWidth / img.naturalWidth,
        window.innerHeight / img.naturalHeight
    );

    // garante que nunca fique menor que 1 (opcional)
    if (scale > 1) scale = 1;

    updateTransform();
}

function fecharZoom() {
    zoom.style.display = "none";
}

function proxima() {
    if (indexAtual < imagens.length - 1) {
        indexAtual++;
        trocarImagem();
    }
}

function anterior() {
    if (indexAtual > 0) {
        indexAtual--;
        trocarImagem();
    }
}

function trocarImagem() {
    zoomImg.src = imagens[indexAtual].src;

    scale = 1.2;
    translateX = 0;
    translateY = 0;

    updateTransform();
}

zoom.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.deltaY < 0) scale += 0.2;
    else {
        scale -= 0.2;
        if (scale < 1) scale = 1;
    }

    updateTransform();
});

zoomImg.addEventListener("mousedown", (e) => {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
    zoomImg.style.cursor = "grabbing";
});

window.addEventListener("mouseup", () => {
    isDragging = false;
    zoomImg.style.cursor = "grab";
});

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    translateX = e.clientX - startX;
    translateY = e.clientY - startY;

    updateTransform();
});

function updateTransform() {
    zoomImg.style.transform =
        `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

/// teclado
document.addEventListener("keydown", (e) => {
    if (zoom.style.display !== "flex") return;

    if (e.key === "ArrowRight") proxima();
    if (e.key === "ArrowLeft") anterior();
    if (e.key === "Escape") fecharZoom();
});

</script>
