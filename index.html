<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sagile Studios</title>

    <link rel="icon" href="https://i.ibb.co/GvPc7F82/Favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TRANSIÇÃO -->
<div class="transition active"></div>

<!-- NEVE -->
<div class="snow-container"></div>

<!-- MENU -->
<header>
    <div class="logo">
        <img src="https://i.ibb.co/twfczfvc/Sagile-logo-png.png">
    </div>

    <div class="search-box">
        <input type="text" placeholder="Pesquisar...">
    </div>

    <nav>
        <a href="livro.html">Livros</a>
        <a href="games.html">Games</a>
        <a href="comics.html">Comics</a>
        <a href="sobre.html">Sobre</a>
        <a href="novidades.html">Novidades</a>
    </nav>
</header>

<!-- CARROSSEL -->
<section class="carrossel">

<button class="seta esquerda">&#10094;</button>

<div class="container" id="lista">

    <div class="card">
        <a href="emd.html">
            <img src="https://i.ibb.co/gZX00HX9/Em-meu-Destino-Remake-Arte-Conceitual-v2.png">
        </a>
    </div>

    <!-- outros cards... -->

</div>

<button class="seta direita">&#10095;</button>

</section>

<!-- SOBRE -->
<section class="sobre">
    <h1>O QUE É A SAGILE STUDIOS?</h1>
    <p>Texto aqui...</p>
</section>

<!-- SCRIPTS (SEMPRE NO FINAL) -->
<script>

window.addEventListener("load", () => {

    const transition = document.querySelector(".transition");

    // fade-in
    transition.classList.remove("active");

    // fade-out ao clicar
    document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", function(e) {

            const href = this.getAttribute("href");

            if (!href || href.startsWith("http")) return;

            e.preventDefault();

            transition.classList.add("active");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });
    });

});

// NEVE
const container = document.querySelector(".snow-container");

for (let i = 0; i < 50; i++) {
    const flake = document.createElement("div");
    flake.classList.add("snowflake");
    flake.innerHTML = "•";

    flake.style.left = Math.random() * 100 + "vw";
    flake.style.animationDuration = (5 + Math.random() * 5) + "s";
    flake.style.fontSize = (5 + Math.random() * 10) + "px";

    container.appendChild(flake);
}

// CARROSSEL
const lista = document.getElementById("lista");

document.querySelector(".direita").onclick = () => {
    lista.scrollBy({ left: 300, behavior: 'smooth' });
};

document.querySelector(".esquerda").onclick = () => {
    lista.scrollBy({ left: -300, behavior: 'smooth' });
};

</script>

</body>
</html>
