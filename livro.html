<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sagile Studios</title>

    <link rel="icon" href="https://i.ibb.co/GvPc7F82/Favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="snow-container"></div>

<header>
    <div class="logo">
        <img src="https://i.ibb.co/twfczfvc/Sagile-logo-png.png">
    </div>

    <div class="search-box">
        <input type="text" placeholder="Pesquisar...">
    </div>

    <nav>
        <a href="livro.html">Livros</a>
        <a href="games.html">Games</a>
        <a href="comics.html">Comics</a>
        <a href="sobre.html">Sobre</a>
        <a href="novidades.html">Novidades</a>
    </nav>
</header>

<section class="catalogo">
    <h1>Livros</h1>

    <div class="grid-livros">

        <div class="livro">
            <img class="capa-livro" src="https://i.ibb.co/gZX00HX9/Em-meu-Destino-Remake-Arte-Conceitual-v2.png">
            <p>Em meu destino</p>
        </div>

    </div>
</section>

<script>
const container = document.querySelector(".snow-container");

for (let i = 0; i < 30; i++) {
    const flake = document.createElement("div");
    flake.classList.add("snowflake");
    flake.innerHTML = "•";

    flake.style.left = Math.random() * 100 + "vw";
    flake.style.animationDuration = (5 + Math.random() * 5) + "s";

    container.appendChild(flake);
}
</script>

</body>
</html>
