<body>

<div class="transition"></div>

<!-- ❄️ NEVE -->

<header>

<div class="logo">
    <a href="index.html">
        <img src="https://i.ibb.co/twfczfvc/Sagile-logo-png.png" alt="Sagile Studios">
    </a>
</div>

<a href="faleconosco.html" class="contato-icon">💬</a>

<div class="search-box">
<input type="text" placeholder="Pesquisar livros, games, comics...">
</div>

<!-- ☰ MENU -->
<div class="menu-toggle" style="font-size:28px; cursor:pointer; padding:10px;">
☰
</div>

<!-- MENU ESCONDIDO -->
<nav id="menu" style="display:none;">
    <a href="livro.html">Livros</a>
    <a href="games.html">Games</a>
    <a href="comics.html">Comics</a>
    <a href="sobre.html">Sobre</a>
    <a href="novidades.html">Novidades</a>
</nav>

</header>

<!-- CONTEÚDO -->
<section class="games-vazio">
    <h1>Ainda não há jogos disponível</h1>
</section>

<footer class="footer">
    <div class="footer-container">

        <div class="footer-logo">
            <img src="https://i.ibb.co/twfczfvc/Sagile-logo-png.png">
            <p>Sagile Studios © 2026</p>
        </div>

        <div class="footer-links">
            <a href="livro.html">Livros</a>
            <a href="games.html">Games</a>

    </div>

        <p>Todos os direitos reservados.</p>
    </div>
</footer>

<!-- 🔥 SCRIPTS -->
<script>

/* ❄️ NEVE CORRIGIDA */
window.addEventListener("load", () => {

    const container = document.querySelector(".snow-container");

    if (!container) return;

    container.style.position = "fixed";
    container.style.top = "0";
    container.style.left = "0";
    container.style.width = "100%";
    container.style.height = "100%";
    container.style.pointerEvents = "none";

    for (let i = 0; i < 50; i++) {
        const flake = document.createElement("div");

        flake.innerHTML = "•";
        flake.style.position = "absolute";
        flake.style.color = "white";
        flake.style.left = Math.random() * 100 + "vw";
        flake.style.top = Math.random() * 100 + "vh";
        flake.style.fontSize = (5 + Math.random() * 10) + "px";

        container.appendChild(flake);
    }

});

/* 🔥 MENU FUNCIONANDO */
const menuToggle = document.querySelector(".menu-toggle");
const menu = document.getElementById("menu");

menuToggle.addEventListener("click", function(e) {
    e.stopPropagation();

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
});

/* FECHAR AO CLICAR FORA */
document.addEventListener("click", function(e) {
    if (!menu.contains(e.target) && !menuToggle.contains(e.target)) {
        menu.style.display = "none";
    }
});

</script>

</body>
</html>
