<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sagile Studios</title>

    <link rel="icon" href="https://i.ibb.co/GvPc7F82/Favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TRANSIÇÃO -->
<div class="transition active"></div>

<!-- MENU -->
<header>

    <div class="logo">
        <img src="https://i.ibb.co/twfczfvc/Sagile-logo-png.png" alt="Sagile Studios">
    </div>

    <div class="search-box">
        <input type="text" placeholder="Pesquisar livros, games, comics...">
    </div>

    <nav>
        <a href="livro.html">Livros</a>
        <a href="games.html">Games</a>
        <a href="comics.html">Comics</a>
        <a href="sobre.html">Sobre</a>
        <a href="#">Login</a>
    </nav>

</header>

<!-- 📚 CATÁLOGO -->
<section class="catalogo reveal">

<h1>Comics</h1>

<p class="subtitulo-catalogo">
Uma aventura lhe aguarda, nossas história em quadrinhos, irá transformar seu lazer em algo explorativo e aventureiro
</p>

    <div class="grid-livros">

        <!-- ITEM -->
        <div class="comics reveal item">
            <a href="kamaisen.html">
                <img class="capa-livro" src="https://i.ibb.co/Q3LyN0B6/Kamai-SEN-2026-Cover-art.jpg">
            </a>
            <p>Kamai SEN - Fronteira sem linha</p>
        </div>

    </div>

</section>

<!-- SCRIPTS -->
<script>

/// 🎬 TRANSIÇÃO
const transition = document.querySelector(".transition");

window.addEventListener("load", () => {
    transition.classList.remove("active");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {

        const href = this.getAttribute("href");

        if (!href || href.startsWith("http")) return;

        e.preventDefault();

        transition.classList.add("active");

        setTimeout(() => {
            window.location.href = href;
        }, 500);
    });
});


/// 🔥 SCROLL REVEAL
function revealOnScroll() {
    const elements = document.querySelectorAll(".reveal");

    elements.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;

        if (elementTop < windowHeight - 100) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);


/// 🟣 SELEÇÃO ESTILO STEAM
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("click", () => {

        document.querySelectorAll(".item").forEach(i => {
            i.classList.remove("ativo");
        });

        item.classList.add("ativo");
    });
});

</script>

</body>
</html>
